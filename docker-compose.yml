version: '3.9'

services:
  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sharegrid-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Backend (Node.js) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: sharegrid-backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    volumes:
      - backend_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health',r=>process.exit(r.statusCode===200?0:1))"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Frontend (Nginx) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sharegrid-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Centrifugo (optional — enable with: docker compose --profile scale up) ─
  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: sharegrid-centrifugo
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./backend/centrifugo/config.json:/centrifugo/config.json:ro
    command: centrifugo --config=/centrifugo/config.json
    environment:
      - CENTRIFUGO_REDIS_ADDRESS=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - scale
    restart: unless-stopped

volumes:
  redis_data:
  backend_data:

networks:
  default:
    name: sharegrid-net
